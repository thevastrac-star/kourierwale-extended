<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kourierwale – Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1e293b 0%,#2563eb 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:1.8rem;font-weight:800;color:#1e293b}
.logo h1 span{color:#2563eb}
.logo p{color:#64748b;font-size:.9rem;margin-top:4px}
.tabs{display:flex;gap:4px;background:#f1f5f9;border-radius:8px;padding:4px;margin-bottom:24px}
.tab{flex:1;text-align:center;padding:8px;border-radius:6px;cursor:pointer;font-size:.875rem;font-weight:500;color:#64748b;transition:.15s}
.tab.active{background:#fff;color:#2563eb;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.form-group{margin-bottom:16px}
label{display:block;font-size:.85rem;font-weight:500;color:#374151;margin-bottom:6px}
input{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;outline:none;transition:.15s}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:.15s;margin-top:4px}
.btn:hover{background:#1d4ed8}
.btn:disabled{background:#94a3b8;cursor:not-allowed}
.error{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:.875rem;margin-bottom:16px;display:none}
.divider{text-align:center;color:#94a3b8;font-size:.8rem;margin:16px 0;position:relative}
.divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#e2e8f0}
.divider span{position:relative;background:#fff;padding:0 12px}
.demo-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:12px;font-size:.8rem;color:#0c4a6e;margin-top:16px}
.demo-box strong{display:block;margin-bottom:4px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <h1>Kourier<span>Wale</span></h1>
    <p>Logistics Management Platform</p>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-client" onclick="switchPanel('client')">Client Login</div>
    <div class="tab" id="tab-admin" onclick="switchPanel('admin')">Admin Login</div>
  </div>

  <div id="error-msg" class="error"></div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')login()"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
  </div>
  <button class="btn" id="login-btn" onclick="login()">Login</button>

  <div class="demo-box">
    <strong>Demo Credentials (after seeding):</strong>
    Admin: admin@kourierwale.com / admin123<br/>
    Client: client@test.com / client123
  </div>
</div>

<script>
const API = (window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1')
  ? 'http://localhost:5000/api'
  : '/api';

let currentPanel = 'client';

function switchPanel(panel) {
  currentPanel = panel;
  document.getElementById('tab-client').classList.toggle('active', panel==='client');
  document.getElementById('tab-admin').classList.toggle('active', panel==='admin');
  document.getElementById('error-msg').style.display = 'none';
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');

  if (!email || !password) {
    err.textContent = 'Please enter email and password.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Logging in...';
  err.style.display = 'none';

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!data.success) throw new Error(data.message || 'Login failed');

    const user = data.user;
    if (currentPanel === 'admin' && user.role !== 'admin') {
      throw new Error('This account does not have admin access.');
    }
    if (currentPanel === 'client' && user.role !== 'client') {
      throw new Error('Please use Admin Login for admin accounts.');
    }

    const prefix = currentPanel;
    localStorage.setItem(prefix + '_token', data.token);
    localStorage.setItem(prefix + '_user', JSON.stringify(user));

    window.location.href = currentPanel === 'admin' ? '../admin/index.html' : '../client/index.html';
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Login';
  }
}

// If already logged in, redirect
const token = localStorage.getItem('client_token') || localStorage.getItem('admin_token');
if (token) {
  const adminUser = JSON.parse(localStorage.getItem('admin_user') || 'null');
  if (adminUser) window.location.href = '../admin/index.html';
  else window.location.href = '../client/index.html';
}
</script>
</body>
</html>
