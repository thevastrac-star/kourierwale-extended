services:
  - type: web
    name: kourierwale-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # Set this in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set this in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BACKEND_URL
        sync: false          # Set to https://kourierwale-api.onrender.com after first deploy
    healthCheckPath: /health
    autoDeploy: true

