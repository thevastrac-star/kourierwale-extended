<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ShipoRAX – Control Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:#06060F;overflow:hidden;
}
.bg{position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 50%,#2a0a5e50 0%,transparent 60%),
    radial-gradient(ellipse at 80% 30%,#0a1a6050 0%,transparent 55%),
    radial-gradient(ellipse at 50% 90%,#1a0a4020 0%,transparent 50%),
    #06060F;
}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:fl 10s ease-in-out infinite}
.o1{width:700px;height:700px;background:radial-gradient(#7C3AED25,transparent);top:-200px;left:-200px}
.o2{width:500px;height:500px;background:radial-gradient(#2563EB20,transparent);bottom:-150px;right:-150px;animation-delay:-5s}
.o3{width:300px;height:300px;background:radial-gradient(#00C9A715,transparent);top:30%;right:20%;animation-delay:-8s}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-40px)}}

.grid{position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(124,58,237,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(124,58,237,.04) 1px,transparent 1px);
  background-size:65px 65px;
}

/* scanning line */
.scan{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#7C3AED80,transparent);animation:scan 4s linear infinite;z-index:3}
@keyframes scan{0%{top:0;opacity:1}90%{top:100%;opacity:.3}100%{top:100%;opacity:0}}

.wrap{position:relative;z-index:10;width:100%;max-width:440px;padding:24px}

.card{
  background:rgba(255,255,255,.03);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:1px solid rgba(124,58,237,.25);
  border-radius:28px;padding:44px 40px;
  box-shadow:0 32px 80px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.08),
    0 0 60px rgba(124,58,237,.06);
  position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#7C3AED,#2563EB,#00C9A7);border-radius:28px 28px 0 0}
.card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,.3),transparent)}

/* corner accents */
.corner{position:absolute;width:20px;height:20px;border-color:#7C3AED50;border-style:solid}
.tl{top:12px;left:12px;border-width:2px 0 0 2px}
.tr{top:12px;right:12px;border-width:2px 2px 0 0}
.bl{bottom:12px;left:12px;border-width:0 0 2px 2px}
.br{bottom:12px;right:12px;border-width:0 2px 2px 0}

.card-head{text-align:center;margin-bottom:32px}
.shield{
  width:80px;height:80px;margin:0 auto 16px;
  border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;
  background:linear-gradient(135deg,#7C3AED15,#2563EB15);
  border:1.5px solid #7C3AED45;
  box-shadow:0 0 0 10px #7C3AED08,0 16px 48px #7C3AED35;
  position:relative;
}
.shield::before{
  content:'';position:absolute;inset:-1px;border-radius:25px;
  background:linear-gradient(135deg,#7C3AED30,transparent,#2563EB30);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;padding:1px;
}
.status-dot{
  position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;border-radius:50%;
  background:#00C9A7;border:2px solid #06060F;
  box-shadow:0 0 8px #00C9A780;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 8px #00C9A780}50%{box-shadow:0 0 16px #00C9A7}}

.sys-label{display:inline-block;padding:4px 14px;border-radius:999px;font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:rgba(124,58,237,.12);color:#A78BFA;border:1px solid rgba(124,58,237,.3);margin-bottom:10px}
.card-head h2{font-size:1.7rem;font-weight:800;color:#fff;letter-spacing:-.025em}
.card-head p{color:rgba(255,255,255,.35);font-size:.85rem;margin-top:5px}

.form-group{margin-bottom:18px}
label{display:block;font-size:.72rem;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:7px;text-transform:uppercase;letter-spacing:.09em}
input{
  width:100%;padding:16px 18px;
  border:1.5px solid rgba(124,58,237,.2);border-radius:13px;
  font-size:.97rem;outline:none;
  background:rgba(124,58,237,.06);color:#fff;
  transition:.25s;font-family:'Inter',sans-serif;
}
input::placeholder{color:rgba(255,255,255,.2)}
input:focus{background:rgba(124,58,237,.12);border-color:#7C3AED80;box-shadow:0 0 0 4px #7C3AED15}

.btn{
  width:100%;padding:18px;border:none;border-radius:14px;
  font-size:1rem;font-weight:700;cursor:pointer;
  transition:.25s;font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#7C3AED,#2563EB);color:#fff;
  box-shadow:0 8px 28px #7C3AED55;margin-top:8px;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.15),transparent);opacity:0;transition:.25s}
.btn:hover::before{opacity:1}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 36px #7C3AED70}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

.error{background:#FF000015;color:#FF9090;padding:12px 16px;border-radius:10px;font-size:.84rem;margin-bottom:16px;display:none;border-left:3px solid #FF4444;border:1px solid #FF444430}

.footer-note{text-align:center;margin-top:20px;font-size:.75rem;color:rgba(255,255,255,.18);letter-spacing:.04em}

@media(max-width:480px){
  .card{padding:28px 20px}
}
</style>
</head>
<body>
<div class="bg"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="grid"></div>
<div class="scan"></div>

<div class="wrap">
  <div class="card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="card-head">
      <div class="shield">
        🛡️
        <div class="status-dot"></div>
      </div>
      <div class="sys-label">Restricted Access</div>
      <h2>Control Centre</h2>
      <p>Authorised personnel only</p>
    </div>

    <div class="error" id="err"></div>

    <div class="form-group">
      <label>Administrator Email</label>
      <input type="email" id="email" placeholder="admin@shiporax.com" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password"
        onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn" id="btn" onclick="doLogin()">
      🔐 &nbsp;Authenticate &amp; Enter
    </button>

    <div class="footer-note">SHIPORAX INTERNAL SYSTEM &nbsp;·&nbsp; UNAUTHORISED ACCESS IS PROHIBITED</div>
  </div>
</div>

<script>
const API = 'https://kourierwale.onrender.com/api';

window.onload = () => {
  if (localStorage.getItem('admin_token')) window.location.href = '/admin';
};

function showErr(msg){
  const e = document.getElementById('err');
  e.textContent = msg; e.style.display = 'block';
  setTimeout(() => e.style.display='none', 5500);
}
function setBtn(loading){
  const b = document.getElementById('btn');
  b.disabled = loading;
  b.textContent = loading ? '⏳  Authenticating...' : '🔐  Authenticate & Enter';
}

async function doLogin(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email||!password){ showErr('⚠️ Please enter credentials'); return; }
  setBtn(true);
  try{
    const r = await fetch(`${API}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d = await r.json();
    if(d.success && d.user.role === 'admin'){
      localStorage.setItem('admin_token', d.token);
      localStorage.setItem('admin_user', JSON.stringify(d.user));
      window.location.href = '/admin';
    } else if(d.success){
      showErr('❌ Access denied. Insufficient privileges.');
    } else {
      showErr('❌ ' + (d.message || 'Authentication failed'));
    }
  } catch(e){ showErr('🔌 Connection error. Please try again.'); }
  setBtn(false);
}
</script>
</body>
</html>
