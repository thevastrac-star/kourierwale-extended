<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SHIPORAX – Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#1e293b 100%)}
.wrapper{display:flex;gap:40px;align-items:stretch;max-width:860px;width:100%;padding:20px}
.panel{background:#fff;border-radius:20px;padding:40px;flex:1;box-shadow:0 25px 60px rgba(0,0,0,.35);display:flex;flex-direction:column}
.panel-header{text-align:center;margin-bottom:32px}
.panel-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 12px}
.admin-icon{background:linear-gradient(135deg,#7c3aed,#2563eb)}
.client-icon{background:linear-gradient(135deg,#059669,#0891b2)}
.panel-header h2{font-size:1.5rem;font-weight:700;color:#0f172a}
.panel-header p{color:#64748b;font-size:.875rem;margin-top:4px}
.divider{height:1px;background:linear-gradient(to right,transparent,#e2e8f0,transparent);margin:20px 0}
.form-group{margin-bottom:16px}
label{display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.9rem;outline:none;transition:.2s;background:#f8fafc}
input:focus{border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s;margin-top:4px;letter-spacing:.02em}
.btn-admin{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff}
.btn-admin:hover{opacity:.9;transform:translateY(-1px)}
.btn-client{background:linear-gradient(135deg,#059669,#0891b2);color:#fff}
.btn-client:hover{opacity:.9;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:8px;font-size:.8rem;margin-bottom:12px;display:none;border-left:3px solid #dc2626}
.separator{text-align:center;color:#94a3b8;font-size:.75rem;margin:16px 0;position:relative}
.separator::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#e2e8f0}
.separator span{background:#fff;padding:0 10px;position:relative}
.badge{display:inline-block;background:#f0fdf4;color:#166534;font-size:.7rem;font-weight:600;padding:3px 8px;border-radius:999px;border:1px solid #bbf7d0;margin-top:8px}
@media(max-width:640px){.wrapper{flex-direction:column;gap:20px}.panel{padding:28px}}
</style>
</head>
<body>
<div class="wrapper">
  <!-- ADMIN LOGIN -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-icon admin-icon">🛠️</div>
      <h2>Admin Panel</h2>
      <p>Manage the entire platform</p>
    </div>
    <div class="error" id="admin-error"></div>
    <div class="form-group">
      <label>Admin Email</label>
      <input type="email" id="admin-email" placeholder="admin@shiporax.com" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="admin-password" placeholder="Enter password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')loginAdmin()"/>
    </div>
    <button class="btn btn-admin" id="admin-btn" onclick="loginAdmin()">🔐 Login to Admin</button>
  </div>

  <!-- CLIENT LOGIN -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-icon client-icon">📦</div>
      <h2>Client Panel</h2>
      <p>Ship orders & manage shipments</p>
    </div>
    <div class="error" id="client-error"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="client-email" placeholder="you@company.com" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="client-password" placeholder="Enter password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')loginClient()"/>
    </div>
    <button class="btn btn-client" id="client-btn" onclick="loginClient()">🚀 Login to Client Panel</button>
    <div class="separator"><span>Don't have an account?</span></div>
    <button class="btn" style="background:#f1f5f9;color:#374151;font-weight:600" onclick="toggleRegister()">📝 Register New Account</button>
    <div id="register-form" style="display:none;margin-top:16px">
      <div class="divider"></div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Your full name"/>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="reg-phone" placeholder="10-digit mobile number" maxlength="10"/>
      </div>
      <button class="btn btn-client" onclick="registerClient()">✅ Create Account</button>
    </div>
  </div>
</div>

<script>
const API = '/api';

// Redirect if already logged in
window.onload = () => {
  const adminToken = localStorage.getItem('admin_token');
  const clientToken = localStorage.getItem('client_token');
  if (adminToken) window.location.href = '/admin';
  else if (clientToken) window.location.href = '/client';
};

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? 'Please wait...' : btn.getAttribute('data-text') || btn.textContent;
}

async function loginAdmin() {
  const email = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-password').value;
  if (!email || !password) { showError('admin-error', 'Please enter email and password'); return; }

  document.getElementById('admin-btn').disabled = true;
  document.getElementById('admin-btn').textContent = 'Logging in...';

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const d = await res.json();
    if (d.success && d.user.role === 'admin') {
      localStorage.setItem('admin_token', d.token);
      localStorage.setItem('admin_user', JSON.stringify(d.user));
      window.location.href = '/admin';
    } else if (d.success && d.user.role !== 'admin') {
      showError('admin-error', 'This account does not have admin access');
    } else {
      showError('admin-error', d.message || 'Invalid credentials');
    }
  } catch (e) {
    showError('admin-error', 'Network error. Please try again.');
  }
  document.getElementById('admin-btn').disabled = false;
  document.getElementById('admin-btn').textContent = '🔐 Login to Admin';
}

async function loginClient() {
  const email = document.getElementById('client-email').value.trim();
  const password = document.getElementById('client-password').value;
  if (!email || !password) { showError('client-error', 'Please enter email and password'); return; }

  document.getElementById('client-btn').disabled = true;
  document.getElementById('client-btn').textContent = 'Logging in...';

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const d = await res.json();
    if (d.success && d.user.role === 'client') {
      localStorage.setItem('client_token', d.token);
      localStorage.setItem('client_user', JSON.stringify(d.user));
      window.location.href = '/client';
    } else if (d.success && d.user.role !== 'client') {
      showError('client-error', 'Use Admin Login for admin accounts');
    } else {
      showError('client-error', d.message || 'Invalid credentials');
    }
  } catch (e) {
    showError('client-error', 'Network error. Please try again.');
  }
  document.getElementById('client-btn').disabled = false;
  document.getElementById('client-btn').textContent = '🚀 Login to Client Panel';
}

function toggleRegister() {
  const f = document.getElementById('register-form');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

async function registerClient() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('client-email').value.trim();
  const password = document.getElementById('client-password').value;
  const phone = document.getElementById('reg-phone').value.trim();
  if (!name || !email || !password) { showError('client-error', 'Name, email and password are required'); return; }
  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, phone, role: 'client' })
    });
    const d = await res.json();
    if (d.success) {
      localStorage.setItem('client_token', d.token);
      localStorage.setItem('client_user', JSON.stringify(d.user));
      window.location.href = '/client';
    } else {
      showError('client-error', d.message || 'Registration failed');
    }
  } catch (e) { showError('client-error', 'Network error'); }
}
</script>
</body>
</html>
