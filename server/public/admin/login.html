<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SHIPORAX – Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:#06060F;overflow:hidden;
}
.bg{position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 50%,#2a0a5e50 0%,transparent 60%),
             radial-gradient(ellipse at 80% 30%,#0a1a6050 0%,transparent 55%),
             radial-gradient(ellipse at 50% 90%,#1a0a4020 0%,transparent 50%),#06060F;
}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:fl 10s ease-in-out infinite;}
.o1{width:700px;height:700px;background:radial-gradient(#7C3AED25,transparent);top:-200px;left:-200px}
.o2{width:500px;height:500px;background:radial-gradient(#2563EB20,transparent);bottom:-150px;right:-150px;animation-delay:-5s}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-40px)}}
.grid{position:fixed;inset:0;
  background-image:linear-gradient(rgba(124,58,237,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(124,58,237,.04) 1px,transparent 1px);
  background-size:65px 65px;
}

.wrap{position:relative;z-index:10;width:100%;max-width:460px;padding:24px}

/* TOP NAV */
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.brand-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#7C3AED,#2563EB);display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 6px 16px #7C3AED50}
.brand-name{font-size:1.1rem;font-weight:800;color:#fff}
.brand-name em{color:#7C3AED;font-style:normal}
.client-link{font-size:.8rem;color:rgba(255,255,255,.4);text-decoration:none;border:1px solid rgba(255,255,255,.12);padding:6px 14px;border-radius:999px;transition:.2s}
.client-link:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.25)}

/* CARD */
.card{
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border:1px solid rgba(124,58,237,.25);
  border-radius:28px;padding:40px;
  box-shadow:0 32px 80px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.1),
    0 0 0 1px rgba(124,58,237,.08);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#7C3AED,#2563EB,#00C9A7);border-radius:28px 28px 0 0;
}
/* GLOW BG */
.card::after{
  content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(#7C3AED15,transparent);
  pointer-events:none;
}

.header{text-align:center;margin-bottom:36px}
.icon-wrap{
  width:88px;height:88px;border-radius:24px;margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;font-size:2.4rem;
  background:linear-gradient(135deg,#7C3AED18,#2563EB18);
  border:1.5px solid #7C3AED55;
  box-shadow:0 0 0 12px #7C3AED0A,0 20px 48px #7C3AED30;
}
.header h1{font-size:1.9rem;font-weight:800;color:#fff;letter-spacing:-.03em}
.header p{color:rgba(255,255,255,.4);font-size:.9rem;margin-top:6px}
.header .badge{
  display:inline-flex;align-items:center;gap:6px;
  background:#7C3AED15;color:#A78BFA;border:1px solid #7C3AED40;
  padding:5px 16px;border-radius:999px;font-size:.72rem;
  font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:12px;
}

.form-group{margin-bottom:20px}
label{display:block;font-size:.78rem;font-weight:600;color:rgba(255,255,255,.55);margin-bottom:8px;text-transform:uppercase;letter-spacing:.07em}
input{
  width:100%;padding:17px 18px;
  border:1.5px solid rgba(255,255,255,.1);border-radius:14px;
  font-size:1rem;outline:none;
  background:rgba(255,255,255,.06);color:#fff;
  transition:.25s;font-family:'Inter',sans-serif;
}
input::placeholder{color:rgba(255,255,255,.25)}
input:focus{background:rgba(255,255,255,.1);border-color:#7C3AED80;box-shadow:0 0 0 4px #7C3AED12}

.btn{
  width:100%;padding:18px;border:none;border-radius:14px;
  font-size:1.1rem;font-weight:700;cursor:pointer;
  transition:.25s;font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:8px;
  position:relative;overflow:hidden;
}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.15),transparent);opacity:0;transition:.25s}
.btn:hover::before{opacity:1}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.btn-main{
  background:linear-gradient(135deg,#7C3AED,#2563EB);color:#fff;
  box-shadow:0 10px 32px #7C3AED55;margin-top:6px;
}
.btn-main:hover{box-shadow:0 16px 40px #7C3AED70}

.error{
  background:#FF000018;color:#FF9090;padding:13px 16px;border-radius:11px;
  font-size:.88rem;margin-bottom:18px;display:none;border-left:3px solid #FF4444;
}

.foot{
  margin-top:24px;text-align:center;
  font-size:.82rem;color:rgba(255,255,255,.35);
}
.foot a{color:#7C3AED;text-decoration:none;font-weight:600}
.foot a:hover{text-decoration:underline}

/* SECURITY NOTE */
.security{
  margin-top:20px;padding:12px 16px;
  background:rgba(124,58,237,.08);border:1px solid #7C3AED25;border-radius:11px;
  display:flex;align-items:center;gap:10px;font-size:.8rem;color:rgba(255,255,255,.4);
}
.security span{font-size:1rem}

@media(max-width:480px){
  .card{padding:28px 22px}
  .btn{padding:20px;font-size:1.1rem}
  input{padding:17px 16px}
}
</style>
</head>
<body>
<div class="bg"><div class="orb o1"></div><div class="orb o2"></div></div>
<div class="grid"></div>

<div class="wrap">
  <div class="top">
    <a class="brand" href="/login">
      <div class="brand-icon">🚀</div>
      <div class="brand-name">Shipo<em>RAX</em></div>
    </a>
    <a class="client-link" href="/client/login">Client Login →</a>
  </div>

  <div class="card">
    <div class="header">
      <div class="icon-wrap">🛠️</div>
      <h1>Admin Login</h1>
      <p>Access the full admin control panel</p>
      <div class="badge"><span>🔐</span> Authorized Personnel Only</div>
    </div>

    <div class="error" id="err"></div>

    <div class="form-group">
      <label>Admin Email Address</label>
      <input type="email" id="email" placeholder="admin@shiporax.com" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password"
        autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>

    <button class="btn btn-main" id="login-btn" onclick="doLogin()">
      🔐 &nbsp;Login to Admin Panel
    </button>

    <div class="security">
      <span>🛡️</span>
      All admin actions are logged and monitored for security.
    </div>

    <div class="foot">
      <a href="/client/login">← Go to Client Login</a>
    </div>
  </div>
</div>

<script>
const API='/api';
window.onload=()=>{
  const t=localStorage.getItem('admin_token');
  if(t) window.location.href='/admin';
};
function showErr(msg){
  const e=document.getElementById('err');
  e.textContent=msg;e.style.display='block';
  setTimeout(()=>e.style.display='none',5000);
}
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  if(!email||!password){showErr('⚠️ Please enter your email and password');return;}
  const btn=document.getElementById('login-btn');
  btn.disabled=true;btn.textContent='⏳  Please wait...';
  try{
    const r=await fetch(`${API}/auth/login`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    const d=await r.json();
    if(d.success&&d.user.role==='admin'){
      localStorage.setItem('admin_token',d.token);
      localStorage.setItem('admin_user',JSON.stringify(d.user));
      window.location.href='/admin';
    }else if(d.success&&d.user.role!=='admin'){
      showErr('⚠️ This is a client account. Use the Client Login page instead.');
    }else{
      showErr('❌ '+(d.message||'Invalid email or password. Please try again.'));
    }
  }catch(e){showErr('🔌 Network error. Please check your connection and try again.');}
  btn.disabled=false;btn.textContent='🔐  Login to Admin Panel';
}
</script>
</body>
</html>
